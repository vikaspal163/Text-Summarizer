<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Summarizer | Professional Text Analysis</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg-main: #0f172a;
            --bg-sidebar: #020617;
            --bg-card: #1e293b;
            --bg-input: #0f172a;
            --accent: #38bdf8;
            --accent-hover: #0ea5e9;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --border: rgba(255, 255, 255, 0.1);
            --transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: var(--bg-main);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* Sidebar */
        .sidebar {
            width: 280px;
            background: var(--bg-sidebar);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 20px;
            transition: var(--transition);
        }

        .sidebar-header {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 700;
            font-size: 1.2rem;
            margin-bottom: 24px;
            color: var(--accent);
        }

        .new-chat-btn {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            cursor: pointer;
            transition: var(--transition);
            font-weight: 500;
            margin-bottom: 20px;
        }

        .new-chat-btn:hover {
            background: var(--bg-card);
            border-color: var(--accent);
        }

        .history-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-secondary);
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .clear-all {
            cursor: pointer;
            text-transform: none;
        }

        .clear-all:hover {
            color: #f87171;
        }

        .history-list {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .history-item {
            padding: 10px 12px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.875rem;
            color: var(--text-secondary);
            transition: var(--transition);
            border: 1px solid transparent;
        }

        .history-item:hover {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-primary);
        }

        .history-item.active {
            background: var(--bg-card);
            color: var(--text-primary);
            border-color: var(--border);
        }

        .history-item span {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 180px;
        }

        .delete-history-btn {
            opacity: 0;
            transition: var(--transition);
            color: var(--text-secondary);
        }

        .history-item:hover .delete-history-btn {
            opacity: 1;
        }

        .delete-history-btn:hover {
            color: #f87171;
        }

        /* Main Content */
        .main-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .header {
            padding: 16px 24px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--bg-sidebar);
            z-index: 10;
        }

        .header-title {
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Chat Area */
        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 24px;
            scroll-behavior: smooth;
        }

        .message-container {
            display: flex;
            flex-direction: column;
            max-width: 85%;
            gap: 8px;
        }

        .message-container.user {
            align-self: flex-end;
            align-items: flex-end;
        }

        .message-container.bot {
            align-self: flex-start;
        }

        .message-bubble {
            padding: 16px 20px;
            border-radius: 16px;
            line-height: 1.6;
            font-size: 0.95rem;
            position: relative;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            white-space: pre-wrap;
            word-break: break-word;
        }

        .user .message-bubble {
            background: var(--accent);
            color: #000;
            border-bottom-right-radius: 4px;
            font-weight: 500;
        }

        .bot .message-bubble {
            background: var(--bg-card);
            color: var(--text-primary);
            border-bottom-left-radius: 4px;
            border: 1px solid var(--border);
        }

        .message-actions {
            display: flex;
            gap: 12px;
            margin-top: 4px;
            opacity: 0.5;
            transition: var(--transition);
        }

        .message-container:hover .message-actions {
            opacity: 1;
        }

        .action-btn {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 0.75rem;
            padding: 4px 8px;
            border-radius: 4px;
            transition: var(--transition);
        }

        .action-btn:hover {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-primary);
        }

        /* Input Area */
        .input-container {
            padding: 24px;
            background: linear-gradient(to top, var(--bg-main) 80%, transparent);
        }

        .input-wrapper {
            max-width: 800px;
            margin: 0 auto;
            position: relative;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            transition: var(--transition);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        .input-wrapper:focus-within {
            border-color: var(--accent);
            box-shadow: 0 0 0 2px rgba(56, 189, 248, 0.2);
        }

        textarea {
            width: 100%;
            background: transparent;
            border: none;
            color: var(--text-primary);
            padding: 16px 60px 16px 16px;
            resize: none;
            outline: none;
            min-height: 56px;
            max-height: 200px;
            font-size: 1rem;
            line-height: 1.5;
        }

        .send-btn {
            background: var(--accent);
            color: #000;
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: var(--transition);
        }

        .send-btn:hover {
            background: var(--accent-hover);
            transform: scale(1.05);
        }

        .send-btn:disabled {
            background: var(--bg-main);
            color: var(--text-secondary);
            cursor: not-allowed;
            transform: none;
        }

        .stats {
            display: flex;
            justify-content: flex-end;
            gap: 16px;
            padding: 8px 16px;
            font-size: 0.7rem;
            color: var(--text-secondary);
            border-top: 1px solid var(--border);
        }

        /* Loader */
        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 12px 16px;
            background: var(--bg-card);
            border-radius: 12px;
            width: fit-content;
            margin-bottom: 24px;
            border: 1px solid var(--border);
        }

        .dot {
            width: 6px;
            height: 6px;
            background: var(--text-secondary);
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out;
        }

        .dot:nth-child(1) { animation-delay: -0.32s; }
        .dot:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        /* Toasts */
        #toast-container {
            position: fixed;
            bottom: 24px;
            right: 24px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            z-index: 100;
        }

        .toast {
            padding: 12px 20px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-left: 4px solid var(--accent);
            color: var(--text-primary);
            border-radius: 8px;
            font-size: 0.875rem;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.2);
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .sidebar {
                position: absolute;
                left: -280px;
                z-index: 50;
                height: 100%;
            }
            .sidebar.open {
                left: 0;
            }
            .menu-toggle {
                display: block !important;
            }
        }

        .menu-toggle {
            display: none;
            background: transparent;
            border: none;
            color: var(--text-primary);
            cursor: pointer;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body>
    <!-- Sidebar -->
    <div id="sidebar" class="sidebar">
        <div class="sidebar-header">
            <i data-lucide="zap"></i>
            <span>AI Summarizer</span>
        </div>
        <button class="new-chat-btn" onclick="newChat()">
            <i data-lucide="plus" size="18"></i>
            New Summary
        </button>
        <div class="history-label">
            <span>Recent History</span>
            <span class="clear-all" onclick="clearAllHistory()">Clear all</span>
        </div>
        <div id="history-list" class="history-list">
            <!-- History items will be injected here -->
        </div>
    </div>

    <!-- Main Content -->
    <div class="main-container">
        <header class="header">
            <div class="header-title">
                <button class="menu-toggle" onclick="toggleSidebar()">
                    <i data-lucide="menu"></i>
                </button>
                <i data-lucide="sparkles" size="20" style="color: var(--accent)"></i>
                <span>T5 Power Summarizer</span>
            </div>
            <div style="display: flex; gap: 16px;">
                <button class="action-btn" onclick="shareSession()">
                    <i data-lucide="share-2" size="16"></i>
                    Share
                </button>
                <button class="action-btn">
                    <i data-lucide="settings" size="16"></i>
                </button>
            </div>
        </header>

        <div id="chat-area" class="chat-area">
            <!-- Messages will be injected here -->
            <div id="empty-state" style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; opacity: 0.5;">
                <i data-lucide="message-square" size="48" style="margin-bottom: 16px;"></i>
                <p>Paste a long text or dialogue to get a concise summary.</p>
            </div>
        </div>

        <div class="input-container">
            <div class="input-wrapper">
                <textarea id="input-field" placeholder="Paste text here... (Ctrl + Enter to send)" rows="1"></textarea>
                <div style="position: absolute; right: 12px; bottom: 12px; display: flex; align-items: center; gap: 8px;">
                    <button class="action-btn" onclick="clearInput()" title="Clear input" style="padding: 6px; border-radius: 8px;">
                        <i data-lucide="trash-2" size="18"></i>
                    </button>
                    <button id="send-btn" class="send-btn" onclick="handleSend()">
                        <i data-lucide="send" size="18"></i>
                    </button>
                </div>
                <div class="stats">
                    <span id="char-count">0 characters</span>
                    <span id="word-count">0 words</span>
                </div>
            </div>
            <p style="text-align: center; font-size: 0.7rem; color: var(--text-secondary); margin-top: 12px;">
                AI can make mistakes. Verify important information.
            </p>
        </div>
    </div>

    <div id="toast-container"></div>

    <script>
        // Initialize Lucide Icons
        lucide.createIcons();

        const chatArea = document.getElementById('chat-area');
        const inputField = document.getElementById('input-field');
        const sendBtn = document.getElementById('send-btn');
        const historyList = document.getElementById('history-list');
        const emptyState = document.getElementById('empty-state');
        const charCount = document.getElementById('char-count');
        const wordCount = document.getElementById('word-count');

        let chats = JSON.parse(localStorage.getItem('summarizer_chats')) || [];
        let isProcessing = false;

        // Auto-resize textarea and count stats
        inputField.addEventListener('input', () => {
            inputField.style.height = 'auto';
            inputField.style.height = inputField.scrollHeight + 'px';
            
            const text = inputField.value;
            charCount.innerText = `${text.length} characters`;
            wordCount.innerText = `${text.trim() === '' ? 0 : text.trim().split(/\s+/).length} words`;
            
            sendBtn.disabled = text.trim() === '';
        });

        // Handle Ctrl + Enter
        inputField.addEventListener('keydown', (e) => {
            if (e.ctrlKey && e.key === 'Enter') {
                handleSend();
            }
        });

        function clearInput() {
            inputField.value = '';
            inputField.style.height = 'auto';
            charCount.innerText = '0 characters';
            wordCount.innerText = '0 words';
            sendBtn.disabled = true;
            inputField.focus();
        }

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
        }

        function showToast(message, type = 'info') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerText = message;
            container.appendChild(toast);
            
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateX(100%)';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        function createMessageElement(text, role) {
            const container = document.createElement('div');
            container.className = `message-container ${role}`;
            
            const bubble = document.createElement('div');
            bubble.className = 'message-bubble';
            
            if (role === 'bot') {
                const span = document.createElement('span');
                bubble.appendChild(span);
                
                const actions = document.createElement('div');
                actions.className = 'message-actions';
                
                const copyBtn = document.createElement('button');
                copyBtn.className = 'action-btn';
                copyBtn.innerHTML = '<i data-lucide="copy" size="14"></i> Copy';
                copyBtn.onclick = () => {
                    navigator.clipboard.writeText(text);
                    showToast('Summary copied to clipboard!');
                };

                const downloadBtn = document.createElement('button');
                downloadBtn.className = 'action-btn';
                downloadBtn.innerHTML = '<i data-lucide="download" size="14"></i> Download';
                downloadBtn.onclick = () => {
                    const blob = new Blob([text], { type: 'text/plain' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `summary_${Date.now()}.txt`;
                    a.click();
                    URL.revokeObjectURL(url);
                    showToast('Summary downloaded!');
                };
                
                actions.appendChild(copyBtn);
                actions.appendChild(downloadBtn);
                container.appendChild(bubble);
                container.appendChild(actions);
            } else {
                bubble.innerText = text;
                container.appendChild(bubble);
            }
            
            return { container, bubble };
        }

        async function typeWriter(element, text) {
            const span = element.querySelector('span');
            let i = 0;
            const speed = 15;
            
            return new Promise(resolve => {
                function type() {
                    if (i < text.length) {
                        span.textContent += text.charAt(i);
                        i++;
                        chatArea.scrollTop = chatArea.scrollHeight;
                        setTimeout(type, speed);
                    } else {
                        resolve();
                    }
                }
                type();
            });
        }

        function showLoading() {
            const loader = document.createElement('div');
            loader.id = 'typing-indicator';
            loader.className = 'typing-indicator';
            loader.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
            chatArea.appendChild(loader);
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        function hideLoading() {
            const loader = document.getElementById('typing-indicator');
            if (loader) loader.remove();
        }

        async function handleSend() {
            const text = inputField.value.trim();
            if (!text || isProcessing) return;

            isProcessing = true;
            emptyState.style.display = 'none';
            inputField.value = '';
            inputField.style.height = 'auto';
            charCount.innerText = '0 characters';
            wordCount.innerText = '0 words';
            sendBtn.disabled = true;

            const { container: userMsg } = createMessageElement(text, 'user');
            chatArea.appendChild(userMsg);
            chatArea.scrollTop = chatArea.scrollHeight;

            showLoading();

            try {
                const response = await fetch('/summarize/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ dialogue: text })
                });

                if (!response.ok) throw new Error('Failed to fetch summary');

                const data = await response.json();
                hideLoading();

                const { container: botMsg, bubble } = createMessageElement(data.summary, 'bot');
                chatArea.appendChild(botMsg);
                lucide.createIcons();
                
                await typeWriter(bubble, data.summary);
                
                saveToHistory(text, data.summary);
                
            } catch (error) {
                hideLoading();
                showToast(error.message, 'error');
                const { container: errorMsg } = createMessageElement("Sorry, I encountered an error processing your request.", 'bot');
                chatArea.appendChild(errorMsg);
            } finally {
                isProcessing = false;
            }
        }

        function saveToHistory(input, output) {
            const id = Date.now();
            chats.unshift({ id, input, output, date: new Date().toLocaleString() });
            if (chats.length > 20) chats.pop();
            localStorage.setItem('summarizer_chats', JSON.stringify(chats));
            renderHistory();
        }

        function renderHistory() {
            historyList.innerHTML = '';
            chats.forEach((chat, index) => {
                const item = document.createElement('div');
                item.className = 'history-item';
                item.innerHTML = `
                    <span>${chat.input.substring(0, 30)}...</span>
                    <i data-lucide="trash-2" size="14" class="delete-history-btn" onclick="deleteHistory(event, ${index})"></i>
                `;
                item.onclick = () => loadFromHistory(chat);
                historyList.appendChild(item);
            });
            lucide.createIcons();
        }

        function loadFromHistory(chat) {
            emptyState.style.display = 'none';
            chatArea.innerHTML = '';
            
            const { container: userMsg } = createMessageElement(chat.input, 'user');
            chatArea.appendChild(userMsg);
            
            const { container: botMsg, bubble } = createMessageElement(chat.output, 'bot');
            chatArea.appendChild(botMsg);
            bubble.querySelector('span').innerText = chat.output;
            
            lucide.createIcons();
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        function deleteHistory(e, index) {
            e.stopPropagation();
            chats.splice(index, 1);
            localStorage.setItem('summarizer_chats', JSON.stringify(chats));
            renderHistory();
            showToast('Item deleted');
        }

        function clearAllHistory() {
            if (confirm('Are you sure you want to clear all history?')) {
                chats = [];
                localStorage.setItem('summarizer_chats', JSON.stringify(chats));
                renderHistory();
                showToast('History cleared');
            }
        }

        function newChat() {
            chatArea.innerHTML = '';
            emptyState.style.display = 'flex';
            chatArea.appendChild(emptyState);
            inputField.value = '';
            inputField.focus();
        }

        function shareSession() {
            showToast('Sharing functionality coming soon!');
        }

        // Init
        renderHistory();
        inputField.focus();
    </script>
</body>
</html>
